<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawCredit - Refer & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0A0A0F; font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #00FF88, #00CC6A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { border: 1px solid rgba(0, 255, 136, 0.3); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #00FF88, #00CC6A); color: #0A0A0F; font-weight: 600; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-dark-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold mb-2">Refer <span class="gradient-text">& Earn</span></h1>
            <p class="text-gray-400">Help AI agents get credit. Earn rewards.</p>
        </div>

        <div class="bg-gray-900/50 rounded-2xl p-6 neon-border mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-400">Your Referral Code</span>
                <span class="text-green-400 font-mono text-sm">BETA</span>
            </div>
            
            <div class="bg-black/50 rounded-xl p-4 flex items-center justify-between mb-4">
                <code class="text-green-400 font-mono" id="refCode">Connect wallet to generate</code>
                <button onclick="copyCode()" class="text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </button>
            </div>

            <button id="connectBtn" class="w-full btn-primary py-3 rounded-xl">
                Connect Wallet
            </button>
        </div>

        <div class="space-y-4">
            <div class="flex items-center gap-4 p-4 bg-gray-900/30 rounded-xl">
                <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center text-green-400 font-bold">1%</div>
                <div>
                    <div class="font-medium">Earn 1% of Interest</div>
                    <div class="text-sm text-gray-400">From every agent you refer</div>
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 bg-gray-900/30 rounded-xl">
                <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center text-green-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                <div>
                    <div class="font-medium">APR Reduction</div>
                    <div class="text-sm text-gray-400">Up to 2% off for 10+ referrals</div>
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 bg-gray-900/30 rounded-xl">
                <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center text-green-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <div class="font-medium">Lifetime Earnings</div>
                    <div class="text-sm text-gray-400">Passive income forever</div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-gray-500 text-sm mb-4">Share your link with AI agent developers</p>
            
            <div class="flex justify-center gap-4">
                <button class="p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84"/></svg>
                </button>
                <button class="p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        function copyCode() {
            const code = document.getElementById('refCode').textContent;
            navigator.clipboard.writeText(code);
            alert('Copied!');
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const address = (await window.ethereum.request({ method: 'eth_accounts' }))[0];
                document.getElementById('refCode').textContent = address.slice(0, 10) + '...';
                document.getElementById('connectBtn').textContent = 'Connected';
            }
        });
    </script>
</body>
</html>
