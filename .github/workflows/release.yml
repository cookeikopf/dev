name: Release

on:
  push:
    tags:
      - 'v*'
      - '@agentlink/*@*'

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  FOUNDRY_VERSION: 'nightly'

jobs:
  # ==========================================
  # Job: Verify Release
  # ==========================================
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          if [[ $TAG == v* ]]; then
            VERSION=${TAG#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION=$(echo $TAG | grep -oP '@\K[0-9]+\.[0-9]+\.[0-9]+.*' || echo "")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
          
          if [[ $TAG == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify tag matches package.json
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ steps.version.outputs.tag }}" == v* && "${{ steps.version.outputs.version }}" != "$ROOT_VERSION" ]]; then
            echo "Error: Tag version ${{ steps.version.outputs.version }} doesn't match package.json version $ROOT_VERSION"
            exit 1
          fi

  # ==========================================
  # Job: Full Test Suite
  # ==========================================
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: Run contract tests
        run: |
          cd packages/contracts
          forge test -vvv
        env:
          FOUNDRY_FUZZ_RUNS: 1024

  # ==========================================
  # Job: Build Packages
  # ==========================================
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            packages/*/dist
            packages/contracts/out
            packages/contracts/broadcast
          retention-days: 30

  # ==========================================
  # Job: NPM Dry Run
  # ==========================================
  npm-dry-run:
    name: NPM Dry Run
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-builds

      - name: Dry run publish SDK
        run: |
          cd packages/sdk
          npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish Shared
        run: |
          cd packages/shared
          npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==========================================
  # Job: Publish to NPM
  # ==========================================
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test, build, npm-dry-run]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-builds

      - name: Publish SDK package
        run: |
          cd packages/sdk
          if [[ "${{ needs.verify.outputs.is_prerelease }}" == "true" ]]; then
            npm publish --tag next --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Shared package
        run: |
          cd packages/shared
          if [[ "${{ needs.verify.outputs.is_prerelease }}" == "true" ]]; then
            npm publish --tag next --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update package versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update root version
          npm version ${{ needs.verify.outputs.version }} --no-git-tag-version
          
          # Commit version update
          git add package.json
          git add packages/*/package.json
          git commit -m "chore(release): bump version to ${{ needs.verify.outputs.version }}"
          git push origin HEAD:main

  # ==========================================
  # Job: Create GitHub Release
  # ==========================================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, publish]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get changes since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges $LAST_TAG..HEAD)
          fi
          
          # Format changelog
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...${{ needs.verify.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          name: Release ${{ needs.verify.outputs.tag }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          prerelease: ${{ needs.verify.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            packages/contracts/out/*.json

  # ==========================================
  # Job: Update Changelog File
  # ==========================================
  update-changelog:
    name: Update Changelog File
    runs-on: ubuntu-latest
    needs: [verify, github-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION=${{ needs.verify.outputs.tag }}
          
          # Create new changelog entry
          cat > /tmp/NEW_ENTRY.md << 'EOF'
          ## [${{ needs.verify.outputs.tag }}] - $DATE

          ### Added
          - New release

          ### Changed
          - See GitHub release notes for details

          EOF
          
          # Prepend to existing changelog or create new
          if [ -f CHANGELOG.md ]; then
            cat /tmp/NEW_ENTRY.md CHANGELOG.md > /tmp/CHANGELOG.md
            mv /tmp/CHANGELOG.md CHANGELOG.md
          else
            cat > CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to this project will be documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

          EOF
            cat /tmp/NEW_ENTRY.md >> CHANGELOG.md
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${{ needs.verify.outputs.tag }}"
          git push origin HEAD:main

  # ==========================================
  # Job: Notify
  # ==========================================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [verify, github-release, publish]
    if: always()
    steps:
      - name: Notify Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#releases'
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            Release ${{ needs.verify.outputs.tag }} ${{ job.status == 'success' && 'published successfully! 🎉' || 'failed! ❌' }}
            
            NPM Packages:
            - @agentlink/sdk@${{ needs.verify.outputs.version }}
            - @agentlink/shared@${{ needs.verify.outputs.version }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ needs.verify.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.verify.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease**: ${{ needs.verify.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "- @agentlink/sdk@${{ needs.verify.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- @agentlink/shared@${{ needs.verify.outputs.version }}" >> $GITHUB_STEP_SUMMARY
