name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  FOUNDRY_VERSION: 'nightly'

jobs:
  # ==========================================
  # Job: Changes Detection
  # ==========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      sdk: ${{ steps.filter.outputs.sdk }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'packages/contracts/**'
              - '.github/workflows/ci.yml'
            dashboard:
              - 'packages/dashboard/**'
              - 'packages/sdk/**'
              - 'packages/shared/**'
              - '.github/workflows/ci.yml'
            sdk:
              - 'packages/sdk/**'
              - 'packages/shared/**'
              - '.github/workflows/ci.yml'
            shared:
              - 'packages/shared/**'
              - '.github/workflows/ci.yml'

  # ==========================================
  # Job: Lint & Format Check
  # ==========================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Run knip (unused exports check)
        run: pnpm knip || true

  # ==========================================
  # Job: Type Check
  # ==========================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:deps

      - name: Type check all packages
        run: pnpm typecheck

  # ==========================================
  # Job: Unit Tests
  # ==========================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:deps

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/sdk/coverage/lcov.info,./packages/shared/coverage/lcov.info,./packages/dashboard/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================
  # Job: Contract Tests (Foundry)
  # ==========================================
  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' || needs.changes.outputs.sdk == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Forge build
        run: |
          cd packages/contracts
          forge --version
          forge build --sizes

      - name: Run Forge tests
        run: |
          cd packages/contracts
          forge test -vvv
        env:
          FOUNDRY_FUZZ_RUNS: 256

      - name: Run Forge coverage
        run: |
          cd packages/contracts
          forge coverage --report lcov

      - name: Upload contract coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/contracts/lcov.info
          flags: contracts
          name: codecov-contracts
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check contract sizes
        run: |
          cd packages/contracts
          forge build --sizes 2>&1 | tee sizes.txt
          if grep -q "Contract code size exceeds 24576 bytes" sizes.txt; then
            echo "Error: Contract exceeds size limit"
            exit 1
          fi

  # ==========================================
  # Job: Build All Packages
  # ==========================================
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            packages/*/.next
            packages/contracts/out
          retention-days: 7

  # ==========================================
  # Job: Integration Tests
  # ==========================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, test-contracts]
    if: ${{ always() && needs.build.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Start local Anvil node
        run: |
          cd packages/contracts
          anvil --fork-url ${{ secrets.BASE_SEPOLIA_RPC_URL }} --fork-block-number 10000000 --silent &
          sleep 5

      - name: Deploy contracts locally
        run: |
          cd packages/contracts
          forge script script/Deploy.s.sol --rpc-url http://localhost:8545 --broadcast --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

      - name: Run integration tests
        run: pnpm test:integration
        env:
          ANVIL_RPC_URL: http://localhost:8545

  # ==========================================
  # Job: Security Audit
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high

      - name: Run slither (contract security)
        if: ${{ needs.changes.outputs.contracts == 'true' }}
        uses: crytic/slither-action@v0.4.0
        with:
          target: packages/contracts
          fail-on: high
          slither-args: '--filter-paths "lib|test|script"'

  # ==========================================
  # Job: Bundle Size Check
  # ==========================================
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.sdk == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Analyze dashboard bundle
        run: |
          cd packages/dashboard
          pnpm analyze || true

      - name: Check SDK bundle size
        run: |
          cd packages/sdk
          du -sh dist/*

  # ==========================================
  # Job: Summary
  # ==========================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-contracts, build, security]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Tests | ${{ needs.test-contracts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.lint.result }}" == "success" && \
                "${{ needs.typecheck.result }}" == "success" && \
                "${{ needs.test-unit.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All required checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
